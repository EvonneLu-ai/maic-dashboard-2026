<html lang="zh-TW">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MAIC 報名分析中心</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--blue:#0071e3;--teal:#5ac8fa;--green:#34c759;--orange:#ff9500;--red:#ff3b30;--purple:#af52de;--bg:#f5f5f7;--card:#fff;--border:#e5e5ea;--text:#1d1d1f;--text2:#6e6e73}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"SF Pro Text","PingFang TC",sans-serif;background:var(--bg);color:var(--text);font-size:13px}
header{background:#fff;border-bottom:1px solid var(--border);padding:18px 36px 0;position:sticky;top:0;z-index:200}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.header-left h1{font-size:20px;font-weight:700}
.header-left p{font-size:11px;color:var(--text2);margin-top:3px}
.back-btn{display:inline-flex;align-items:center;gap:5px;background:rgba(0,113,227,.08);color:#0071e3;text-decoration:none;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;border:1px solid rgba(0,113,227,.15)}
.back-btn:hover{background:rgba(0,113,227,.14)}
/* DIM TABS */
.dim-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-top:4px}
.dim-tab{padding:9px 20px;font-size:12.5px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.dim-tab:hover{color:var(--text)}
.dim-tab.active{color:var(--blue);border-color:var(--blue);font-weight:600}
/* PANELS */
.panel{display:none}.panel.active{display:block}
.wrap{max-width:1080px;margin:0 auto;padding:22px 24px 80px}
/* SUB-FILTER BAR */
.filter-bar{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:120px}
.filter-label{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.4px;text-transform:uppercase}
.filter-group select,.filter-group input{padding:5px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;background:#fff;color:var(--text);outline:none;min-width:130px}
.filter-group select:focus,.filter-group input:focus{border-color:var(--blue)}
.filter-chips{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.chip{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--border);background:#fff;cursor:pointer;color:var(--text2);transition:all .12s;white-space:nowrap}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.chip.active-green{background:var(--green);color:#fff;border-color:var(--green)}
.chip.active-orange{background:var(--orange);color:#fff;border-color:var(--orange)}
.chip.active-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.chip.active-red{background:var(--red);color:#fff;border-color:var(--red)}
/* STATS ROW */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat-box{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 16px;text-align:center;min-width:100px;flex:1}
.stat-num{font-size:24px;font-weight:800;line-height:1}
.stat-lbl{font-size:10px;color:var(--text2);margin-top:3px}
/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
/* TABLE */
.tbl-wrap{overflow-x:auto;max-height:480px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#f5f5f7;padding:8px 10px;text-align:left;font-weight:600;color:var(--text2);font-size:11px;letter-spacing:.3px;position:sticky;top:0;z-index:1;border-bottom:1.5px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid #f0f0f5;vertical-align:middle}
tr:hover td{background:rgba(0,113,227,.04)}
.tc{text-align:center}.tr{text-align:right}
.fw{font-weight:700}.tblue{color:var(--blue)}.tgreen{color:var(--green)}.torange{color:var(--orange)}.tred{color:var(--red)}.tgray{color:var(--text2)}
/* PILLS */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.p-blue{background:rgba(0,113,227,.12);color:var(--blue)}
.p-green{background:rgba(52,199,89,.12);color:var(--green)}
.p-orange{background:rgba(255,149,0,.12);color:var(--orange)}
.p-red{background:rgba(255,59,48,.12);color:var(--red)}
.p-purple{background:rgba(175,82,222,.12);color:var(--purple)}
.p-gray{background:rgba(0,0,0,.07);color:var(--text2)}
.p-teal{background:rgba(90,200,250,.15);color:#007aab}
/* INSIGHT */
.ins{display:flex;gap:9px;padding:9px 12px;border-radius:8px;margin-bottom:7px;font-size:12px;line-height:1.6}
.ins-icon{font-size:15px;flex-shrink:0}
.ins-blue{background:rgba(0,113,227,.07);border-left:3px solid var(--blue)}
.ins-green{background:rgba(52,199,89,.07);border-left:3px solid var(--green)}
.ins-orange{background:rgba(255,149,0,.07);border-left:3px solid var(--orange)}
.ins-red{background:rgba(255,59,48,.07);border-left:3px solid var(--red)}
/* RESULT COUNT */
.result-count{font-size:12px;color:var(--text2);margin-bottom:8px}
.result-count b{color:var(--blue)}
/* BAR */
.mbar{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mbar-l{font-size:11.5px;min-width:110px}
.mbar-t{flex:1;height:12px;background:var(--bg);border-radius:6px;overflow:hidden}
.mbar-f{height:100%;border-radius:6px}
.mbar-v{font-size:11px;font-weight:700;min-width:32px;text-align:right}
/* SEARCH */
.search-box{width:100%;padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;outline:none;box-sizing:border-box}
.search-box:focus{border-color:var(--blue)}
.search-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.search-chip{font-size:10.5px;padding:2px 9px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;line-height:1.7}
.search-chip:hover,.search-chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
footer{text-align:center;font-size:11px;color:var(--text2);padding:16px;border-top:1px solid var(--border)}
</style>

// ── 搜尋正規化：全形→半形、統一小寫 ──
function normalizeSearch(str) {
  if (!str) return '';
  return str
    .replace(/[\uff01-\uff5e]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xfee0)) // 全形→半形
    .replace(/\u3000/g, ' ')  // 全形空白→半形
    .toLowerCase()
    .trim();
}

function searchMatchTeam(t, raw) {
  if (!raw) return true;
  const q = normalizeSearch(raw);
  if (!q) return true;
  // 展開別名：若輸入對應到 SCHOOL_ALIAS，同時用別名對應的關鍵字搜尋
  const aliasKey = SCHOOL_ALIAS[raw.trim()] || SCHOOL_ALIAS[q] || null;
  const norm = s => normalizeSearch(s);
  return norm(t.name).includes(q)
    || norm(t.school).includes(q)
    || norm(t.dept).includes(q)
    || norm(t.id).includes(q)
    || (aliasKey && norm(t.school).includes(normalizeSearch(aliasKey)));
}

function filtered(overrides) {
  const f = Object.assign({}, FS, overrides||{});
  return TEAMS.filter(t =>
    (f.track==='all'   || t.track===f.track) &&
    (f.school==='all'  || t.school===f.school) &&
    (f.region==='all'  || t.region===f.region) &&
    (f.deptCat==='all' || t.deptCat===f.deptCat) &&
    (f.nameCat==='all' || t.nameCat===f.nameCat) &&
    searchMatchTeam(t, f.search)
  );
}

function onSearchChange(cb) {
  const zone = document.getElementById('search-result-zone-' + cb);
  if (!zone) { window[cb](); return; }
  // 只重繪 table 區 + filterBar 計數，不動 chart
  const t = filtered();
  // 更新計數 badge
  const badge = document.getElementById('search-count-' + cb);
  if (badge) badge.innerHTML = `符合 <b style="color:var(--blue)">${t.length}</b> 隊`;
  // 更新 table
  const extra = zone.dataset.extra === 'true';
  zone.innerHTML = teamTable(t, extra);
  // 更新搜尋框本身（✕ 按鈕顯示 + chip active 狀態），用局部 DOM 操作避免整頁 rebuild
  const inp = document.getElementById('search-input-' + cb);
  if (inp) {
    inp.style.paddingRight = FS.search ? '28px' : '12px';
    // 更新 ✕ 按鈕
    let clearBtn = inp.parentNode.querySelector('button[title="清除搜尋"]');
    if (FS.search && !clearBtn) {
      clearBtn = document.createElement('button');
      clearBtn.title = '清除搜尋';
      clearBtn.setAttribute('style','position:absolute;right:6px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:14px;line-height:1;padding:2px 4px;border-radius:4px');
      clearBtn.textContent = '✕';
      clearBtn.onmouseover = () => clearBtn.style.color='var(--blue)';
      clearBtn.onmouseout  = () => clearBtn.style.color='var(--text2)';
      clearBtn.onclick = () => setSearch('', cb);
      inp.parentNode.appendChild(clearBtn);
    } else if (!FS.search && clearBtn) {
      clearBtn.remove();
    }
  }
  // 更新 chip active 狀態
  document.querySelectorAll('.search-chips .search-chip').forEach(el => {
    el.classList.toggle('active', el.textContent.trim() === FS.search || el.dataset?.val === FS.search);
  });
}

// Dynamic insights based on current filtered data
function genInsights(t) {
  const total = t.length;
  if(!total) return '';
  const bySchool = countBySchool(t);
  const byTrack  = countBy(t,'track');
  const byRegion = countBy(t,'region');
  const byDeptCat= countBy(t,'deptCat');
  const topSchool= Object.entries(bySchool).sort((a,b)=>b[1]-a[1])[0];
  const topDept  = Object.entries(byDeptCat).sort((a,b)=>b[1]-a[1])[0];
  const edPct    = Math.round((byDeptCat['教育']||0)/total*100);
  const southPct = Math.round((byRegion['南部']||0)/total*100);
  const obs=[], rec=[];

  // Observations
  if(topSchool) obs.push(ins('🏆',`最多隊伍來自 <b>${topSchool[0].replace('國立','')}</b>，共 ${topSchool[1]} 隊（${Math.round(topSchool[1]/total*100)}%）`,'ins-blue'));
  if(byTrack['創業']) obs.push(ins('🏁',`創業組 ${byTrack['創業']||0} 隊（${Math.round((byTrack['創業']||0)/total*100)}%）、創新組 ${byTrack['創新']||0} 隊（${Math.round((byTrack['創新']||0)/total*100)}%）、創意組 ${byTrack['創意']||0} 隊（${Math.round((byTrack['創意']||0)/total*100)}%）`,'ins-blue'));
  if(edPct>30) obs.push(ins('⚠️',`教育學系佔比 ${edPct}%，科系分佈過度集中，缺乏資工/設計背景的隊伍`,'ins-orange'));
  if(southPct<15 && !FS.region) obs.push(ins('🗺️',`南部隊伍僅佔 ${southPct}%，地區分佈嚴重偏北部/中部`,'ins-orange'));
  if(topDept) obs.push(ins('🎓',`最多見科系類別為 <b>${topDept[0]}</b>（${topDept[1]} 隊），次多為 <b>${Object.entries(byDeptCat).sort((a,b)=>b[1]-a[1])[1]?.[0]||''}</b>`,'ins-blue'));

  // Recommendations
  if(edPct>50) rec.push(ins('💡','政大教育學系大量集體報名，建議審查是否為課堂指定作業。可設定「企畫書上傳」為強制資格確認機制。','ins-red'));
  if((byRegion['南部']||0)<15 && !FS.region) rec.push(ins('🎯','南部滲透率不足：成大、中山等頂尖校完全缺席。明年應優先安排南部說明會，並邀請高雄科大現有老師擴大推廣。','ins-green'));

  if(!rec.length) rec.push(ins('✅','當前篩選條件下各維度分佈相對均衡。','ins-green'));

  return insBlock('🔍 特別觀察', obs) + insBlock('🎯 決策建議', rec);
}
function countBy(arr, key) {
  const r={};arr.forEach(t=>{ r[t[key]]=(r[t[key]]||0)+1; }); return r;
}
// 方案B1：學校統計計入 extraSchool（任一成員邏輯）
function countBySchool(arr) {
  const r={};
  arr.forEach(t=>{
    if(t.school) r[t.school]=(r[t.school]||0)+1;
    if(t.extraSchool) t.extraSchool.split(',').forEach(s=>{ s=s.trim(); if(s) r[s]=(r[s]||0)+1; });
  });
  return r;
}
function mbar(label, count, max, color, extra) {
  const w=Math.max(2,Math.round(count/max*100));
  return `<div class="mbar"><div class="mbar-l">${label}</div>
    <div class="mbar-t"><div class="mbar-f" style="width:${w}%;background:${color||'var(--blue)'}"></div></div>
    <div class="mbar-v">${count}</div>${extra||''}</div>`;
}
function statBox(num, lbl, color) {
  return `<div class="stat-box"><div class="stat-num" style="color:${color||'var(--blue)'}">${num}</div><div class="stat-lbl">${lbl}</div></div>`;
}

// ── Dynamic filter bar builder ──
// 動態篩選：根據已選條件，篩選出還有資料的選項
function dynOpts(key, labelAll, labelFn, preFilter) {
  // preFilter: filtered() but ignoring the current key's own filter
  const fsBackup = FS[key];
  FS[key] = 'all';
  const base = preFilter || filtered();
  FS[key] = fsBackup;
  const vals = [...new Set(base.map(t=>t[key]).filter(Boolean))].sort();
  return ['all',...vals].map(v=>`<option value="${v}"${FS[key]===v?' selected':''}>${v==='all'?labelAll:labelFn(v)}</option>`).join('');
}
function buildFilterBar(opts) {
  opts = opts || {};
  const cb = opts.cb || '';

  // Build base pool: ignore each key's own filter, but apply ALL other active filters
  // (including search) — so only options with real data are shown
  function baseIgnoring(key) {
    const bk = FS[key]; FS[key] = 'all';
    const r = filtered();
    FS[key] = bk;
    return r;
  }
  const schoolOpts = ['all', ...[...new Set(baseIgnoring('school').map(t => t.school).filter(Boolean))].sort()]
    .map(s => `<option value="${s}"${FS.school === s ? ' selected' : ''}>${s === 'all' ? '全部學校' : s.replace('國立', '')}</option>`).join('');
  const regionOpts = ['all', ...[...new Set(baseIgnoring('region').map(t => t.region).filter(Boolean))].sort()]
    .map(r => `<option value="${r}"${FS.region === r ? ' selected' : ''}>${r === 'all' ? '全部地區' : r}</option>`).join('');
  const trackOpts = ['all', ...[...new Set(baseIgnoring('track').map(t => t.track).filter(Boolean))].sort()]
    .map(t => `<option value="${t}"${FS.track === t ? ' selected' : ''}>${t === 'all' ? '全部賽道' : t}</option>`).join('');
  const deptOpts = ['all', ...[...new Set(baseIgnoring('deptCat').map(t => t.deptCat).filter(Boolean))].sort()]
    .map(d => `<option value="${d}"${FS.deptCat === d ? ' selected' : ''}>${d === 'all' ? '全部科系類別' : d}</option>`).join('');
  const nameOpts = ['all', ...[...new Set(baseIgnoring('nameCat').map(t => t.nameCat).filter(Boolean))].sort()]
    .map(n => `<option value="${n}"${FS.nameCat === n ? ' selected' : ''}>${n === 'all' ? '全部組名類型' : n}</option>`).join('');

  const show = opts;
  let html = `<div class="filter-bar">`;
  if(show.track)   html += `<div class="filter-group"><div class="filter-label">🏁 賽道</div><select onchange="FS.track=this.value;${cb}()">${trackOpts}</select></div>`;
  if(show.region)  html += `<div class="filter-group"><div class="filter-label">🗺️ 地區</div><select onchange="FS.region=this.value;${cb}()">${regionOpts}</select></div>`;
  if(show.school)  html += `<div class="filter-group"><div class="filter-label">🏫 學校</div><select onchange="FS.school=this.value;${cb}()">${schoolOpts}</select></div>`;
  if(show.deptCat) html += `<div class="filter-group"><div class="filter-label">🎓 科系類別</div><select onchange="FS.deptCat=this.value;${cb}()">${deptOpts}</select></div>`;
  if(show.nameCat) html += `<div class="filter-group"><div class="filter-label">💬 組名類型</div><select onchange="FS.nameCat=this.value;${cb}()">${nameOpts}</select></div>`;
  if(show.search) {
    const chipsHtml = SEARCH_CHIPS.map(c =>
      `<button class="search-chip${FS.search===c.val?' active':''}" onclick="setSearch('${c.val}','${cb}')">${c.label}</button>`
    ).join('');
    html += `<div class="filter-group" style="flex:1;min-width:180px">
      <div class="filter-label">🔍 搜尋（組名/學校/科系/編號）</div>
      <div style="position:relative;display:flex;align-items:center">
        <input id="search-input-${cb}" class="search-box" type="text" placeholder="關鍵字、別名如台大/政大/ntu..."
          value="${FS.search}" style="padding-right:${FS.search?'28px':'12px'}"
          oninput="if(!event.isComposing){FS.search=this.value;debounce('search-${cb}',()=>onSearchChange('${cb}'))}"
          oncompositionend="FS.search=this.value;debounce('search-${cb}',()=>onSearchChange('${cb}'),0)"
        >${FS.search?`<button onclick="setSearch('','${cb}')" title="清除搜尋" style="position:absolute;right:6px;background:none;border:none;cursor:pointer;color:var(--text2);font-size:14px;line-height:1;padding:2px 4px;border-radius:4px" onmouseover="this.style.color='var(--blue)'" onmouseout="this.style.color='var(--text2)'">✕</button>`:''}
      </div>
      <div class="search-chips">${chipsHtml}</div>
    </div>`;
  }
  const cur = filtered();
  html += `<div style="display:flex;align-items:flex-end;gap:8px">
    <span id="search-count-${cb}" style="font-size:11px;color:var(--text2)">符合 <b style="color:var(--blue)">${cur.length}</b> 隊</span>
    <button class="chip" onclick="Object.assign(FS,{track:'all',school:'all',region:'all',deptCat:'all',nameCat:'all',search:''});${cb}()">✕ 清除</button>
  </div>`;
  html += `</div>`;
  return html;
}

// ── Team table ──
// hl(text): 有搜尋關鍵字時，高亮匹配的文字片段
function hl(text) {
  if (!FS.search || !text) return text;
  const q = normalizeSearch(FS.search);
  const aliasKey = SCHOOL_ALIAS[FS.search.trim()] || SCHOOL_ALIAS[q] || null;
  const target = aliasKey ? normalizeSearch(aliasKey) : q;
  if (!target) return text;
  const norm = normalizeSearch(text);
  const idx = norm.indexOf(target);
  if (idx < 0) return text;
  const matched = text.slice(idx, idx + target.length);
  return text.slice(0, idx)
    + `<mark style="background:#ffd60a;color:#1d1d1f;border-radius:2px;padding:0 1px">${matched}</mark>`
    + text.slice(idx + target.length);
}

function teamTable(teams, extra) {
  if(!teams.length) return `<div class="result-count">無符合條件的隊伍</div>`;
  const header = extra
    ? `<tr><th>#</th><th>組名</th><th>賽道</th><th>學校</th><th>科系</th><th>地區</th><th>科系類別</th><th>組名類型</th></tr>`
    : `<tr><th>#</th><th>組名</th><th>賽道</th><th>學校</th><th>科系</th><th>組名類型</th></tr>`;
  const rows = teams.map((t,i)=>{
    const tc=TRACK_COLORS[t.track]||'#aaa';
    const nc=NAMECAT_COLORS[t.nameCat]||'#aaa';
    const schoolDisplay = hl(t.school.replace('國立',''));
    const deptDisplay = hl(t.dept);
    const nameDisplay = hl(t.name);
    return extra
      ? `<tr><td class="tgray">${t.id}</td><td class="fw">${nameDisplay}</td>
          <td>${pill(t.track,`pill p-${t.track==='創意'?'blue':t.track==='創新'?'teal':'purple'}`)}</td>
          <td>${schoolDisplay}</td><td style="font-size:11px;color:var(--text2)">${deptDisplay}</td>
          <td><span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${REGION_COLORS[t.region]}22;color:${REGION_COLORS[t.region]};font-weight:600">${t.region}</span></td>
          <td><span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${DEPTCAT_COLORS[t.deptCat]}22;color:${DEPTCAT_COLORS[t.deptCat]};font-weight:600">${t.deptCat}</span></td>
          <td><span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${nc}22;color:${nc};font-weight:600">${t.nameCat}</span></td></tr>`
      : `<tr><td class="tgray">${t.id}</td><td class="fw">${nameDisplay}</td>
          <td>${pill(t.track,`pill p-${t.track==='創意'?'blue':t.track==='創新'?'teal':'purple'}`)}</td>
          <td>${schoolDisplay}</td><td style="font-size:11px;color:var(--text2)">${deptDisplay}</td>
          <td><span style="font-size:10px;padding:2px 7px;border-radius:10px;background:${nc}22;color:${nc};font-weight:600">${t.nameCat}</span></td></tr>`;
  }).join('');
  const countLabel = FS.search
    ? `共 <b>${teams.length}</b> 支隊伍 <span style="color:var(--blue);font-size:10px">🔍「${FS.search}」</span>`
    : `共 <b>${teams.length}</b> 支隊伍`;
  return `<div class="result-count">${countLabel}</div>
    <div class="tbl-wrap"><table><thead>${header}</thead><tbody>${rows}</tbody></table></div>`;
}

    mkChart('c-dp-track',{type:'bar',data:{labels:ALL_DEPTCATS,datasets:ALL_TRACKS.map(tr=>({label:tr,data:ALL_DEPTCATS.map(d=>t.filter(x=>x.deptCat===d&&x.track===tr).length),backgroundColor:TRACK_COLORS[tr],borderRadius:3}))},options:{plugins:{legend:{position:'top',labels:{font:{size:11}}}},scales:{x:{stacked:true},y:{stacked:true,grid:{color:'rgba(0,0,0,0.04)'}}}}});
  },50);
}

// ── 組名分析 ──────────────────────────────────────────────────────
function buildName() {
  const w = document.getElementById('w-name');
  const t = filtered();
  const byNameCat = countBy(t,'nameCat');
  const maxNC = Math.max(...Object.values(byNameCat),1);

  w.innerHTML = buildFilterBar({cb:'buildName',school:true,region:true,track:true,deptCat:true,nameCat:true,search:true})
  + `<div class="stats-row">
    ${ALL_NAMECATS.map(n=>`<div class="stat-box" style="border-top:3px solid ${NAMECAT_COLORS[n]}">
      <div class="stat-num" style="color:${NAMECAT_COLORS[n]};font-size:18px">${byNameCat[n]||0}</div>
      <div class="stat-lbl" style="font-size:10px">${n}</div>
    </div>`).join('')}
  </div>
  <div class="g2">
    <div class="card"><div class="card-title">組名類型分佈</div><canvas id="c-nm-bar" height="160"></canvas></div>
    <div class="card"><div class="card-title">組名類型 × 賽道</div><canvas id="c-nm-track" height="160"></canvas></div>
  </div>
  ${ALL_NAMECATS.map(n=>{
    const sub=t.filter(x=>x.nameCat===n);
    if(!sub.length) return '';
    return `<div class="card">
      <div class="card-title" style="color:${NAMECAT_COLORS[n]}">💬 ${n} — ${sub.length} 隊</div>
      <div style="margin-bottom:8px;display:flex;flex-wrap:wrap;gap:4px">
        ${sub.map(x=>`<span style="font-size:11.5px;padding:3px 9px;border-radius:20px;background:${NAMECAT_COLORS[n]}15;color:${NAMECAT_COLORS[n]};border:1px solid ${NAMECAT_COLORS[n]}30;font-weight:600">${x.name}</span>`).join('')}
      </div>
      ${teamTable(sub)}
    </div>`;
  }).join('')}`;
  w.innerHTML += genInsights(t);

  setTimeout(()=>{
    const ncVals=ALL_NAMECATS.map(n=>byNameCat[n]||0);
    mkChart('c-nm-bar',{type:'bar',data:{labels:ALL_NAMECATS,datasets:[{data:ncVals,backgroundColor:ALL_NAMECATS.map(n=>NAMECAT_COLORS[n]),borderRadius:5}]},options:{plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(0,0,0,0.04)'}}}}});
    mkChart('c-nm-track',{type:'bar',data:{labels:ALL_NAMECATS,datasets:ALL_TRACKS.map(tr=>({label:tr,data:ALL_NAMECATS.map(n=>t.filter(x=>x.nameCat===n&&x.track===tr).length),backgroundColor:TRACK_COLORS[tr],borderRadius:3}))},options:{plugins:{legend:{position:'top',labels:{font:{size:10}}}},scales:{x:{stacked:true},y:{stacked:true,grid:{color:'rgba(0,0,0,0.04)'}}}}});
  },50);
}

// ── 完整隊伍表 ──────────────────────────────────────────────────────
function buildTeams() {

// ════════════════════════════════════════════════
//  維度切換
// ════════════════════════════════════════════════
const BUILT = {};
const BUILDERS = {
  overview:buildOverview, track:buildTrack, school:buildSchool,
  dept:buildDept, name:buildName, timeline:buildTimeline, teams:buildTeams
};

function showDim(dim) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.dim-tab').forEach((b,i)=>{
    const dims=['overview','track','school','dept','name','timeline','teams'];
    b.classList.toggle('active',dims[i]===dim);
  });
  document.getElementById('p-'+dim).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  BUILT[dim]=false; // always rebuild so filters apply
  BUILDERS[dim]();
}

// ── 初始化 ──
showDim('overview');
