<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MAIC 報名分析中心</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --blue:#0071e3; --teal:#5ac8fa; --green:#34c759; --orange:#ff9500;
    --red:#ff3b30;  --purple:#af52de; --bg:#f5f5f7; --card:#ffffff;
    --border:#e5e5ea; --text:#1d1d1f; --text2:#6e6e73;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"SF Pro Text","PingFang TC",sans-serif;background:var(--bg);color:var(--text)}

  /* ── HEADER ── */
  header{background:#fff;border-bottom:1px solid var(--border);padding:22px 40px 0;position:sticky;top:0;z-index:100}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
  .header-left h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
  .header-left p{font-size:12px;color:var(--text2);margin-top:4px}
  .back-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(0,113,227,.08);color:#0071e3;
    text-decoration:none;border-radius:20px;padding:7px 16px;font-size:12px;font-weight:600;
    border:1px solid rgba(0,113,227,.15);white-space:nowrap;margin-top:2px}
  .back-btn:hover{background:rgba(0,113,227,.14)}

  /* ── DIM FILTER BAR ── */
  .dim-bar{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0 0;align-items:center}
  .dim-label{font-size:12px;font-weight:700;color:var(--text2);margin-right:4px}
  .dim-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);
    cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s;white-space:nowrap}
  .dim-btn:hover{border-color:var(--blue);color:var(--blue)}
  .dim-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}

  /* ── PANEL ── */
  .panel{display:none}
  .panel.active{display:block}
  .wrap{max-width:1040px;margin:0 auto;padding:28px 24px 80px}

  /* ── SECTION TITLE ── */
  .stitle{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
    color:var(--text2);margin:22px 0 10px;border-left:3px solid var(--blue);padding-left:8px}

  /* ── KPI GRID ── */
  .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
  .kpi4{grid-template-columns:repeat(4,1fr)}
  .kpi5{grid-template-columns:repeat(5,1fr)}
  .kpi3{grid-template-columns:repeat(3,1fr)}
  .kpi-box{background:var(--card);border-radius:10px;padding:14px 16px;border:1px solid var(--border)}
  .kpi-lbl{font-size:11px;color:var(--text2);margin-bottom:4px}
  .kpi-val{font-size:26px;font-weight:800;line-height:1}
  .kpi-sub{font-size:11px;color:var(--text2);margin-top:4px}

  /* ── CARD ── */
  .card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:14px}
  .card-title{font-size:12px;font-weight:700;margin-bottom:12px;color:var(--text)}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

  /* ── TABLE ── */
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{background:var(--bg);text-align:left;padding:8px 10px;font-weight:600;color:var(--text2);
    font-size:11px;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border)}
  td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
  tr:hover td{background:rgba(0,113,227,.04)}
  tr:nth-child(even) td{background:rgba(0,0,0,.01)}
  .tc{text-align:center}.tr{text-align:right}
  .fw{font-weight:700}.tblue{color:var(--blue)}.tgreen{color:var(--green)}
  .torange{color:var(--orange)}.tred{color:var(--red)}.tgray{color:var(--text2)}

  /* ── INSIGHT BOX ── */
  .insight{display:flex;gap:10px;padding:10px 14px;border-radius:9px;margin-bottom:8px}
  .insight-icon{font-size:16px;flex-shrink:0;margin-top:1px}
  .insight-text{font-size:12px;line-height:1.65;color:var(--text)}
  .ins-blue{background:rgba(0,113,227,.07);border-left:3px solid var(--blue)}
  .ins-green{background:rgba(52,199,89,.07);border-left:3px solid var(--green)}
  .ins-orange{background:rgba(255,149,0,.07);border-left:3px solid var(--orange)}
  .ins-red{background:rgba(255,59,48,.07);border-left:3px solid var(--red)}
  .ins-purple{background:rgba(175,82,222,.07);border-left:3px solid var(--purple)}

  /* ── PILL BADGE ── */
  .pill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;margin:1px}
  .p-blue{background:rgba(0,113,227,.12);color:var(--blue)}
  .p-green{background:rgba(52,199,89,.12);color:var(--green)}
  .p-orange{background:rgba(255,149,0,.12);color:var(--orange)}
  .p-red{background:rgba(255,59,48,.12);color:var(--red)}
  .p-purple{background:rgba(175,82,222,.12);color:var(--purple)}
  .p-gray{background:rgba(0,0,0,.07);color:var(--text2)}

  /* ── MINI BAR ── */
  .mbar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .mbar-lbl{font-size:12px;min-width:95px}
  .mbar-track{flex:1;height:13px;background:var(--bg);border-radius:6px;overflow:hidden}
  .mbar-fill{height:100%;border-radius:6px;background:var(--blue)}
  .mbar-val{font-size:11px;font-weight:700;min-width:44px;text-align:right;color:var(--text)}

  /* ── FUNNEL ── */
  .funnel-step{border-radius:7px;padding:11px;text-align:center;font-size:12px;font-weight:700;color:#fff;margin-bottom:4px}
  .funnel-arrow{text-align:center;font-size:16px;color:var(--text2);margin:2px 0}

  /* ── FOOTER ── */
  footer{text-align:center;font-size:11px;color:var(--text2);padding:20px;border-top:1px solid var(--border);margin-top:16px}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-left">

      <p>行動應用創新賽 2026 ｜ 資料截至 2026/04/29 ｜ 225 支隊伍 × 13 所學校</p>

    <button class="dim-btn" onclick="setDim('track')">🏁 賽道分析</button>
    <button class="dim-btn" onclick="setDim('region')">🗺️ 地區 / 學校</button>
    <button class="dim-btn" onclick="setDim('dept')">🔀 跨域組隊</button>

// ══════════════════════════════════════════════
//  Chart 管理
// ══════════════════════════════════════════════
const CHARTS = {};
function mkChart(id, cfg) {
  if (CHARTS[id]) { CHARTS[id].destroy(); delete CHARTS[id]; }
  const el = document.getElementById(id);
  if (el) CHARTS[id] = new Chart(el, cfg);
}

// ══════════════════════════════════════════════
//  UI helpers
// ══════════════════════════════════════════════
const ST = t => `<div class="stitle">${t}</div>`;
function kpi(lbl, val, sub, color) {
  return `<div class="kpi-box"><div class="kpi-lbl">${lbl}</div>
    <div class="kpi-val" style="color:${color||'var(--blue)'}">${val}</div>
    ${sub?`<div class="kpi-sub">${sub}</div>`:''}
  </div>`;
}
function ins(icon, text, cls) {
  return `<div class="insight ${cls||'ins-blue'}"><span class="insight-icon">${icon}</span><span class="insight-text">${text}</span></div>`;
}
function mbar(label, count, max, color) {
  const w = Math.max(2, Math.round(count/max*100));
  return `<div class="mbar-row">
    <div class="mbar-lbl">${label}</div>
    <div class="mbar-track"><div class="mbar-fill" style="width:${w}%;background:${color||'var(--blue)'}"></div></div>
    <div class="mbar-val">${count}</div>
  </div>`;
}

        ${AN.timeline.map((t,i)=>`<tr>
          <td class="fw">${t.date}</td>
          <td class="tc">
            <div style="display:flex;align-items:center;gap:6px;justify-content:center">
              <div style="width:${Math.round(t.count/57*72)}px;height:10px;border-radius:5px;background:${t.color};min-width:4px"></div>
              <span class="fw" style="color:${t.color}">${t.count}</span>
            </div>
          </td>
          <td class="tc tgray">${(t.count/195*100).toFixed(1)}%</td>
          <td style="font-size:11.5px;color:var(--text2)">${t.event||'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
  ${ST('📋 報名漏斗（Funnel）')}
  <div class="card" style="max-width:600px;margin:0 auto 14px">
    ${[
      {label:'已完成基本報名',count:225,color:'#0071e3',pct:100},
      {label:'年級/系所填寫齊全',count:91,color:'#5ac8fa',pct:40},
      {label:'分工欄位填寫',count:106,color:'#34c759',pct:47},
      {label:'企畫書已上傳',count:1,color:'#ff3b30',pct:0.4}
    ].map((f,i,arr)=>`
      <div class="funnel-step" style="background:${f.color};margin:0 ${i*18}px">${f.label}：${f.count} 隊 (${f.pct}%)</div>
      ${i<arr.length-1?'<div class="funnel-arrow">▼</div>':''}`).join('')}
  </div>
  ${ST('🔑 時程與轉換決策洞察')}
  ${ins('📅','4/10 單日57隊是全程最大爆發點（佔29%）。應深入追查當日觸發管道（說明會/老師群組/社群貼文），作為明年預算分配依據。','ins-blue')}
  ${ins('🔄','兩波明顯浪潮（4/10 & 4/22）顯示學生報名高度受外部觸發驅動。應在說明會後24-48h內發送填報提醒，強化轉換效率。','ins-blue')}
  ${ins('⚠️','企畫書上傳率僅0.4%（1/225），是最嚴重的轉換瓶頸。建議設「提交企畫書初稿才確認資格」門檻，並提供範本+線上工作坊。','ins-red')}
  ${ins('💡','4/15的27隊為臺中教大批量湧入，但年級/分工資料幾乎全空。批次報名後的「資料補全追蹤」是下一個優化重點。','ins-orange')}`;

  setTimeout(()=>{
    mkChart('c-fn-bar',{type:'bar',data:{labels:AN.timeline.map(t=>t.date),datasets:[{label:'報名隊數',data:AN.timeline.map(t=>t.count),backgroundColor:AN.timeline.map(t=>t.color),borderRadius:6}]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:ctx=>{const ev=AN.timeline[ctx.dataIndex].event;return ev?'→ '+ev:'';}}}},scales:{y:{grid:{color:'rgba(0,0,0,0.04)'}}}}});
  },50);
}

// ══════════════════════════════════════════════
//  維度切換
// ══════════════════════════════════════════════
const BUILT = {};
function setDim(dim) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.dim-btn').forEach((b,i)=>{
    const dims=['all','track','region','dept','grade','funnel'];
    b.classList.toggle('active', dims[i]===dim);
  });
  document.getElementById('panel-'+dim).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  if (!BUILT[dim]) {
    BUILT[dim]=true;
    if (dim==='all')    buildAll();
    if (dim==='track')  buildTrack();
    if (dim==='region') buildRegion();
    if (dim==='dept')   buildDept();
    if (dim==='grade')  buildGrade();
    if (dim==='funnel') buildFunnel();
  }
}

// 初始化
setDim('all');
</script>
