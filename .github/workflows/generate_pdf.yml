name: Generate PDF Report

on:
  push:
    paths:
      - 'data/*.csv'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install fpdf2 matplotlib

      - name: Download NotoSansCJK font
        run: |
          curl -sL \
            "https://github.com/googlefonts/noto-cjk/raw/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Regular.otf" \
            -o NotoSansCJKtc.otf

      - name: Generate PDF
        run: python scripts/generate_pdf.py

      - name: Commit PDF back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MAIC2026_Dashboard.pdf
          git diff --cached --quiet || git commit -m "auto: regenerate PDF [skip ci]"
          git push
